name: Build Minified Node.js
on: [workflow_dispatch] # 手动点击运行

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Node.js Source
        uses: actions/checkout@v4
        with:
          repository: nodejs/node
          ref: v20.18.3 # 指定版本
          fetch-depth: 1

      - name: Install NASM
        run: choco install nasm

      - name: Build Node.js (Minified)
        shell: cmd
        run: |
          :: 使用 vcbuild.bat 的正确 Windows 参数格式
          :: release: 生产版本
          :: x64: 64位架构
          :: no-intl: 移除所有国际化数据 (对应之前的 without-intl)
          :: no-inspector: 移除调试器 (对应之前的 without-inspector)
          .\vcbuild.bat release x64 no-intl no-inspector


      - name: Upload Minified node.exe
        uses: actions/upload-artifact@v4
        with:
          name: minified-node-exe
          path: out/Release/node.exe
